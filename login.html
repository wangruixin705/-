<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 哈尔滨理工大学计算机科学与技术学院</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            font-size: 14px;
            color: #333;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== 主体 ========== */
        .login-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-box {
            width: 420px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* 标签切换 */
        .login-tabs {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 16px 0;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            background: #fafafa;
            border: none;
            outline: none;
            font-family: "Microsoft YaHei", sans-serif;
            transition: all 0.3s;
        }

        .login-tab.active {
            color: #105fa4;
            background: #fff;
            font-weight: bold;
            border-bottom: 2px solid #105fa4;
        }

        .login-tab:hover:not(.active) {
            color: #105fa4;
            background: #f0f7ff;
        }

        /* 表单区 */
        .login-form-box {
            padding: 35px 40px;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #105fa4;
            box-shadow: 0 0 0 3px rgba(16, 95, 164, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
            font-size: 13px;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row input {
            flex: 1;
        }

        .captcha-box {
            width: 100px;
            height: 44px;
            background: #e8e8e8;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #105fa4;
            letter-spacing: 4px;
            cursor: pointer;
            user-select: none;
            border: 1px solid #d9d9d9;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input {
            width: 14px;
            height: 14px;
            accent-color: #105fa4;
        }

        .forgot-link {
            color: #105fa4;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            height: 46px;
            background: #105fa4;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-family: "Microsoft YaHei", sans-serif;
            cursor: pointer;
            transition: background 0.3s;
            letter-spacing: 4px;
        }

        .btn-submit:hover {
            background: #0d4e88;
        }

        .register-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .other-login {
            margin-top: 28px;
            text-align: center;
        }

        .other-login p {
            font-size: 13px;
            color: #999;
            margin-bottom: 14px;
            position: relative;
        }

        .other-login p::before,
        .other-login p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 70px;
            height: 1px;
            background: #e8e8e8;
        }

        .other-login p::before { left: 30px; }
        .other-login p::after { right: 30px; }

        .login-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .login-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }

        .login-icon:hover {
            background: #e6f0fa;
            color: #105fa4;
        }

        /* ========== 底部 ========== */
        .login-footer {
            background: #105fa4;
            padding: 20px 0;
            text-align: center;
        }

        .login-footer p {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .login-footer a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

   
    <!-- 登录主体 -->
    <div class="login-main">
        <div class="login-box">
            <!-- 标签切换 -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('login')">用户登录</button>
                <button class="login-tab" onclick="switchTab('register')">账号注册</button>
            </div>

            <div class="login-form-box">
                <!-- 登录面板 -->
                <div id="panel-login" class="form-panel active">
                    <form onsubmit="return handleLogin(event)">
                        <div class="form-group">
                            <label>用户名 / 学号 / 工号</label>
                            <input type="text" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" placeholder="请输入密码" required>
                        </div>
                        <div class="form-group">
                            <label>验证码</label>
                            <div class="form-row">
                                <input type="text" placeholder="请输入验证码" required>
                                <div class="captcha-box" onclick="refreshCaptcha()" title="点击刷新">A7K9</div>
                            </div>
                        </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox"> 记住密码
                            </label>
                            <a href="#" class="forgot-link">忘记密码？</a>
                        </div>
                        <button type="submit" class="btn-submit">登 录</button>
                    </form>

                    <div class="other-login">
                        <p>其他方式登录</p>
                        <div class="login-icons">
                            <a href="#" class="login-icon" title="微信登录">微信</a>
                            <a href="#" class="login-icon" title="QQ登录">QQ</a>
                            <a href="#" class="login-icon" title="理工邮箱">邮箱</a>
                        </div>
                    </div>
                </div>

                <!-- 注册面板 -->
                <div id="panel-register" class="form-panel">
                    <form onsubmit="return handleRegister(event)">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" placeholder="请设置用户名（6-20位字母数字）" required>
                        </div>
                        <div class="form-group">
                            <label>真实姓名</label>
                            <input type="text" placeholder="请输入真实姓名" required>
                        </div>
                        <div class="form-group">
                            <label>身份类型</label>
                            <select required>
                                <option value="">请选择身份</option>
                                <option>在校学生</option>
                                <option>教职工</option>
                                <option>毕业校友</option>
                                <option>校外访客</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" placeholder="请设置密码（8位以上，含字母+数字）" required>
                            <div class="register-hint">密码长度不少于8位，需同时包含字母和数字</div>
                        </div>
                        <div class="form-group">
                            <label>确认密码</label>
                            <input type="password" placeholder="请再次输入密码" required>
                        </div>
                        <div class="form-group">
                            <label>手机号</label>
                            <input type="tel" placeholder="请输入常用手机号" required>
                        </div>
                        <div class="form-group">
                            <label>验证码</label>
                            <div class="form-row">
                                <input type="text" placeholder="短信验证码" required>
                                <button type="button" class="btn-submit" style="width:110px;height:44px;font-size:13px;background:#1384e2;letter-spacing:0;" onclick="sendCode(this)">获取验证码</button>
                            </div>
                        </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" required> 我已阅读并同意 <a href="#" style="color:#105fa4;">用户协议</a>
                            </label>
                        </div>
                        <button type="submit" class="btn-submit">注 册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

   
    <script>
    // ========== 模拟用户数据库（实际项目中是后端数据库）==========
    const users = [
        { username: 'admin', password: '123456' },
        { username: 'student', password: 'hrbust' }
    ];

    // ========== 切换标签页 ==========
    function switchTab(type) {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        if (type === 'login') {
            document.querySelectorAll('.login-tab')[0].classList.add('active');
            document.getElementById('panel-login').classList.add('active');
        } else {
            document.querySelectorAll('.login-tab')[1].classList.add('active');
            document.getElementById('panel-register').classList.add('active');
        }
    }

    // ========== 刷新验证码 ==========
    function refreshCaptcha() {
        const box = document.querySelector('.captcha-box');
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
        box.textContent = code;
    }

    // ========== 登录校验 ==========
   function handleLogin(e) {
    e.preventDefault();  // 阻止默认提交
    
    const username = document.querySelector('#panel-login input[type="text"]').value;
    const password = document.querySelector('#panel-login input[type="password"]').value;
    
    const user = users.find(u => u.username === username && u.password === password);
    
    if (user) {
        alert('登录成功！');
        // 明确指定跳转目标，不要用相对路径可能有歧义
        window.location.replace('登录注册.html');  // ← 用 replace 代替 href
    } else {
        alert('用户名或密码错误！');
    }
    
    return false;  // 双重保险
}
    // ========== 注册：控制台显示用户信息 ==========
    function handleRegister(e) {
        e.preventDefault();
        
        // 获取注册表单的所有输入值
        const inputs = document.querySelectorAll('#panel-register input, #panel-register select');
        const userInfo = {
            username: inputs[0].value,      // 用户名
            realName: inputs[1].value,      // 真实姓名
            identity: inputs[2].value,      // 身份类型
            password: inputs[3].value,      // 密码
            confirmPassword: inputs[4].value,  // 确认密码
            phone: inputs[5].value,         // 手机号
            smsCode: inputs[6].value        // 短信验证码
        };
        
        // 简单校验
        if (userInfo.password !== userInfo.confirmPassword) {
            alert('两次密码输入不一致！');
            return false;
        }
        
        if (userInfo.password.length < 8) {
            alert('密码长度不能少于8位！');
            return false;
        }
        
        // 控制台打印用户信息
        console.log('==================== 新用户注册 ====================');
        console.log('用户名：', userInfo.username);
        console.log('真实姓名：', userInfo.realName);
        console.log('身份类型：', userInfo.identity);
        console.log('密码：', userInfo.password);
        console.log('手机号：', userInfo.phone);
        console.log('===================================================');
        
        // 添加到模拟数据库（实际项目中是发请求给后端）
        users.push({
            username: userInfo.username,
            password: userInfo.password
        });
        
        alert('注册成功！请登录。');
        switchTab('login');   // 自动切换到登录页
        
        return false;
    }

    // ========== 短信倒计时 ==========
    function sendCode(btn) {
        let sec = 60;
        btn.disabled = true;
        btn.style.background = '#999';
        btn.textContent = sec + 's';
        const timer = setInterval(() => {
            sec--;
            if (sec <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.style.background = '#1384e2';
                btn.textContent = '获取验证码';
            } else {
                btn.textContent = sec + 's';
            }
        }, 1000);
    }
</script>
</body>
</html>
