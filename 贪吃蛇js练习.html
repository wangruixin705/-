<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing:border-box;
        }
        #main{
            height:420px ;
            width: 360px;
            border: 10px #000 solid;
            background-color: #b7d4a8;
            border-radius: 20px;
            margin: 50px auto;
        }
        #stage{
            width: 304px;
            height: 304px;
            border: 2px solid #000;
            margin: 20px auto;
            position: relative;
        }
        #info{
            width: 304px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            font: bold 20px courier;
        }
        #food{
            width: 10px;
            height: 10px;
            position: absolute;
            background-color: #000;
            top: 100px;
            left: 200px;
            border-radius: 3px;
        }
       #snake > div {
          width: 10px;
          height: 10px;
          border:1px solid #b7d4a8 ;
          box-sizing: border-box;
          background-color: #000;
          position: absolute;
       }
    </style>
</head>
<body>
    <div id="main">
        <div id="stage">
           <div id="food"></div>
           <div id="snake">
            <div></div>
           </div>
        </div>
        <div id="info">
            <div>SCORE: <span id="score">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>
    </div>
  <script>
    let dir
    let x = 0
    let y = 0
    
    let score = 0      // 从0开始
    let level = 0      // 从0开始
    
    const snake = document.getElementById("snake")
    const snakes = snake.getElementsByTagName("div")
    const food = document.getElementById("food")
    
    const scoreSpan = document.getElementById("score")
    const levelSpan = document.getElementById("level")
    
    const reObj = {
        ArrowUp: "ArrowDown",
        ArrowDown: "ArrowUp",
        ArrowLeft: "ArrowRight",
        ArrowRight: "ArrowLeft"
    }
    
    const keyArr = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"]

    function changeFood(){
        const x = Math.floor(Math.random() * 30) * 10
        const y = Math.floor(Math.random() * 30) * 10
        food.style.left = x + "px"
        food.style.top = y + "px"
    }

    document.addEventListener("keydown", (event) => {
        if (!keyArr.includes(event.key)) return
        if (snakes.length < 2 || reObj[dir] !== event.key) {
            dir = event.key
        }
    })

    setTimeout(function move(){
        if(!dir){
            setTimeout(move, 300)
            return
        }

        switch(dir){
            case "ArrowUp":    y -= 10; break
            case "ArrowDown":  y += 10; break
            case "ArrowLeft":  x -= 10; break
            case "ArrowRight": x += 10; break
        }

        if (x < 0 || x > 290 || y < 0 || y > 290) {
            alert("撞墙了！游戏结束！")
            return
        }

        if (dir) {
            for (let i = 0; i < snakes.length; i++) {
                if (snakes[i].offsetLeft === x && snakes[i].offsetTop === y) {
                    alert("撞到自己了，游戏结束！")
                    return
                }
            }
        }

        if (
            snakes[0].offsetTop === food.offsetTop &&
            snakes[0].offsetLeft === food.offsetLeft
        ) {
            changeFood()
            snake.insertAdjacentHTML("beforeend", "<div/>")
            
            score++
            scoreSpan.textContent = score
            
            // 每3分升一级，level从0开始，显示时+1
            if (score % 3 === 0 && level < 14) {
                level++
                levelSpan.textContent = level + 1
            }
        }

        const tail = snakes[snakes.length - 1]
        tail.style.left = x + "px"
        tail.style.top = y + "px"
        snake.insertAdjacentElement("afterbegin", tail)

        const speed = Math.max(140, 300 - level * 20)
        setTimeout(move, speed)
    }, 300)
</script>
</body>
</html>
